<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Multi-author document decomposition pipeline">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
.ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 400; }
</style>
</defs>

<rect x="40" y="50" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="105" y="76" text-anchor="middle" fill="#2C2C2A">Paragraph</text>
<text class="ts" x="105" y="94" text-anchor="middle" fill="#5F5E5A">Raw input text</text>

<line x1="170" y1="78" x2="220" y2="78" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="220" y="50" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="285" y="76" text-anchor="middle" fill="#2C2C2A">Sentences</text>
<text class="ts" x="285" y="94" text-anchor="middle" fill="#5F5E5A">Tokenized units</text>

<line x1="350" y1="78" x2="400" y2="78" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="400" y="50" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="465" y="76" text-anchor="middle" fill="#26215C">Grammar tree</text>
<text class="ts" x="465" y="94" text-anchor="middle" fill="#534AB7">Stanford parser</text>

<path d="M530 78 L 570 78 L 570 130" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<rect x="480" y="130" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="570" y="156" text-anchor="middle" fill="#26215C">PQ-gram index</text>
<text class="ts" x="570" y="174" text-anchor="middle" fill="#534AB7">Syntactic substructures</text>

<path d="M570 186 L 570 238 L 500 238" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<rect x="370" y="210" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="435" y="236" text-anchor="middle" fill="#26215C">PQ-gram profile</text>
<text class="ts" x="435" y="254" text-anchor="middle" fill="#534AB7">Frequency table</text>

<line x1="370" y1="238" x2="330" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="210" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="265" y="236" text-anchor="middle" fill="#04342C">Paragraph profile</text>
<text class="ts" x="265" y="254" text-anchor="middle" fill="#0F6E56">Aggregated features</text>

<line x1="200" y1="238" x2="170" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="210" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="105" y="236" text-anchor="middle" fill="#04342C">Cluster (GMM)</text>
<text class="ts" x="105" y="254" text-anchor="middle" fill="#0F6E56">Author groups</text>

<text class="ts" x="340" y="320" text-anchor="middle" fill="#5F5E5A">Text → parse trees → syntactic feature profiles → author clusters</text>
</svg>
